name: tfreport-report-matrix
description: Download tfreport-prepare artifacts, aggregate them into a cross-report summary, and send it to GitHub — the one-step version for multi-subscription matrix workflows
author: Black Mesa Ltd

# Preset wiring the download + aggregate + send primitives:
#   tfreport/.github/action/download → aggregate → send
#
# The prepare primitive still runs inside each matrix leg (it can't be
# wrapped because the matrix expansion isn't known until the plan job
# produces artifacts). This preset handles everything downstream.
#
# Empty-state handling: when tfreport-download finds zero artifacts,
# the preset writes `empty-message` to the output file and still runs
# send — so the PR body / step summary / sticky comment reflects
# "no changes" rather than failing the job.
#
# Internal refs are pinned to the tfreport release version (currently
# v0.0.3) — composite actions do not support expressions in `uses:`, so
# every release bump requires updating the hardcoded refs in this file
# and report-plan/action.yml before cutting the tag.

inputs:
  # Download
  version:
    description: "tfreport version to install"
    required: false
    default: "latest"
  artifact-pattern:
    description: "Artifact name pattern to download (default matches tfreport-prepare's output)"
    required: false
    default: "tfreport-*"
  artifact-path:
    description: "Local download path. Default: $RUNNER_TEMP/tfreport-downloads."
    required: false
    default: ""

  # Aggregate
  target:
    description: "Output target"
    required: false
    default: "markdown"
  config:
    description: "Path to .tfreport.yml config file"
    required: false
  changed-only:
    description: "Show only changed resources"
    required: false
    default: "true"
  output-file:
    description: "Optional file path to persist the rendered output to. The preset always writes to a temp path regardless; use this to keep a copy at a known location."
    required: false
  empty-message:
    description: "Fallback message when zero artifacts match (no subscriptions changed)"
    required: false
    default: "_No infrastructure changes detected in this PR._"

  # Send
  step-summary:
    description: "Append the rendered output to $GITHUB_STEP_SUMMARY"
    required: false
    default: "false"
  pr-body-marker:
    description: "Splice the rendered output between <!-- BEGIN_<marker> --> and <!-- END_<marker> --> in the PR body. Empty = skip."
    required: false
    default: ""
  pr-comment-marker:
    description: "Upsert a sticky PR comment identified by <!-- <marker> --> at the start of the comment body. Empty = skip."
    required: false
    default: ""
  github-token:
    description: "GitHub token (required when pr-body-marker or pr-comment-marker is set)"
    required: false
    default: ""
  pr-number:
    description: "PR number override. Empty = auto-derive from the triggering event."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Resolve output path
      id: resolve
      shell: bash
      env:
        INPUT_OUTPUT_FILE: ${{ inputs.output-file }}
      run: |
        if [ -n "$INPUT_OUTPUT_FILE" ]; then
          path="$INPUT_OUTPUT_FILE"
        else
          path="$RUNNER_TEMP/tfreport-snippet.md"
        fi
        mkdir -p "$(dirname "$path")"
        echo "path=$path" >> "$GITHUB_OUTPUT"

    - name: Download
      id: download
      uses: BlackMesaLTD/tfreport/.github/action/download@v0.0.3
      with:
        pattern: ${{ inputs.artifact-pattern }}
        path:    ${{ inputs.artifact-path }}

    - name: Aggregate
      if: ${{ steps.download.outputs.count != '0' }}
      uses: BlackMesaLTD/tfreport/.github/action/aggregate@v0.0.3
      with:
        version:       ${{ inputs.version }}
        target:        ${{ inputs.target }}
        report-files:  ${{ steps.download.outputs.reports }}
        config:        ${{ inputs.config }}
        changed-only:  ${{ inputs.changed-only }}
        output-file:   ${{ steps.resolve.outputs.path }}

    - name: Empty-state fallback
      if: ${{ steps.download.outputs.count == '0' }}
      shell: bash
      env:
        OUTPUT_PATH:   ${{ steps.resolve.outputs.path }}
        EMPTY_MESSAGE: ${{ inputs.empty-message }}
      run: |
        printf '%s\n' "$EMPTY_MESSAGE" > "$OUTPUT_PATH"

    - name: Send
      uses: BlackMesaLTD/tfreport/.github/action/send@v0.0.3
      with:
        content-file:       ${{ steps.resolve.outputs.path }}
        step-summary:       ${{ inputs.step-summary }}
        pr-body-marker:     ${{ inputs.pr-body-marker }}
        pr-comment-marker:  ${{ inputs.pr-comment-marker }}
        github-token:       ${{ inputs.github-token }}
        pr-number:          ${{ inputs.pr-number }}
