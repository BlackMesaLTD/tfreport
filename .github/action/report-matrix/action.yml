name: tfreport-report-matrix
description: Download tfreport-prepare artifacts, aggregate them into a cross-report summary, and send it to GitHub — the one-step version for multi-subscription matrix workflows
author: Black Mesa Ltd

# Self-contained: all binary-install, artifact-download, aggregate, and send
# logic is inlined (or sourced from scripts/). No sibling `uses:` refs, so
# there's no internal version coordination to worry about at release time.
#
# The prepare primitive still runs inside each matrix leg (it can't be
# wrapped because the matrix expansion isn't known until the plan job
# produces artifacts). This preset handles everything downstream.
#
# Empty-state handling: when zero matching artifacts are found, writes
# `empty-message` to the output file and still runs send — so the PR body
# / step summary / sticky comment reflects "no changes" rather than
# failing the job.

inputs:
  # Download
  version:
    description: "tfreport version to install"
    required: false
    default: "latest"
  artifact-pattern:
    description: "Artifact name pattern to download (same glob syntax as actions/download-artifact). Default matches what tfreport-prepare uploads."
    required: false
    default: "tfreport-*"
  artifact-path:
    description: "Local download path. Default: $RUNNER_TEMP/tfreport-downloads."
    required: false
    default: ""
  report-filename:
    description: "Filename inside each downloaded artifact containing the tfreport JSON."
    required: false
    default: "report.json"

  # Aggregate
  target:
    description: "Output target"
    required: false
    default: "markdown"
  config:
    description: "Path to .tfreport.yml config file"
    required: false
  changed-only:
    description: "Show only changed resources"
    required: false
    default: "true"
  output-file:
    description: "Optional file path to persist the rendered output to. The preset always writes to a temp path regardless; use this to keep a copy at a known location."
    required: false
  empty-message:
    description: "Fallback message when zero artifacts match (no subscriptions changed)"
    required: false
    default: "_No infrastructure changes detected in this PR._"

  # Send
  step-summary:
    description: "Append the rendered output to $GITHUB_STEP_SUMMARY"
    required: false
    default: "false"
  pr-body-marker:
    description: "Splice the rendered output between <!-- BEGIN_<marker> --> and <!-- END_<marker> --> in the PR body. Empty = skip."
    required: false
    default: ""
  pr-comment-marker:
    description: "Upsert a sticky PR comment identified by <!-- <marker> --> at the start of the comment body. Empty = skip."
    required: false
    default: ""
  github-token:
    description: "GitHub token (required when pr-body-marker or pr-comment-marker is set)"
    required: false
    default: ""
  pr-number:
    description: "PR number override. Empty = auto-derive from the triggering event."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Resolve paths
      id: resolve
      shell: bash
      env:
        INPUT_OUTPUT_FILE:   ${{ inputs.output-file }}
        INPUT_ARTIFACT_PATH: ${{ inputs.artifact-path }}
      run: |
        if [ -n "$INPUT_OUTPUT_FILE" ]; then
          output_path="$INPUT_OUTPUT_FILE"
        else
          output_path="$RUNNER_TEMP/tfreport-snippet.md"
        fi
        mkdir -p "$(dirname "$output_path")"
        if [ -z "$INPUT_ARTIFACT_PATH" ]; then
          INPUT_ARTIFACT_PATH="$RUNNER_TEMP/tfreport-downloads"
        fi
        mkdir -p "$INPUT_ARTIFACT_PATH"
        {
          echo "output_path=$output_path"
          echo "artifact_path=$INPUT_ARTIFACT_PATH"
        } >> "$GITHUB_OUTPUT"

    - name: Download artifacts
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        pattern: ${{ inputs.artifact-pattern }}
        path:    ${{ steps.resolve.outputs.artifact_path }}

    - name: Inventory downloads
      id: inventory
      shell: bash
      env:
        DL_PATH:         ${{ steps.resolve.outputs.artifact_path }}
        REPORT_FILENAME: ${{ inputs.report-filename }}
      run: |
        paths=""
        if [ -d "$DL_PATH" ]; then
          paths=$(find "$DL_PATH" -type f -name "$REPORT_FILENAME" 2>/dev/null | sort)
        fi
        if [ -z "$paths" ]; then
          count=0
        else
          count=$(printf '%s\n' "$paths" | wc -l | tr -d ' ')
        fi
        {
          echo "count=$count"
          echo "reports<<TFR_EOF"
          printf '%s' "$paths"
          echo ""
          echo "TFR_EOF"
        } >> "$GITHUB_OUTPUT"
        echo "Found $count report file(s) matching '$REPORT_FILENAME' under $DL_PATH"

    - name: Install tfreport
      if: ${{ steps.inventory.outputs.count != '0' }}
      shell: bash
      env:
        TFREPORT_VERSION: ${{ inputs.version }}
      run: bash "$GITHUB_ACTION_PATH/../../../scripts/install-tfreport.sh"

    - name: Aggregate
      if: ${{ steps.inventory.outputs.count != '0' }}
      shell: bash
      env:
        INPUT_REPORT_FILES: ${{ steps.inventory.outputs.reports }}
        INPUT_TARGET:       ${{ inputs.target }}
        INPUT_CONFIG:       ${{ inputs.config }}
        INPUT_CHANGED_ONLY: ${{ inputs.changed-only }}
        OUTPUT_PATH:        ${{ steps.resolve.outputs.output_path }}
      run: |
        shopt -s nullglob
        reports=()
        while IFS= read -r line; do
          line="${line## }"; line="${line%% }"
          [ -z "$line" ] && continue
          for p in $line; do reports+=("$p"); done
        done <<< "$INPUT_REPORT_FILES"

        if [ ${#reports[@]} -eq 0 ]; then
          echo "::error::tfreport-report-matrix: inventory reported files but none resolved"
          exit 1
        fi

        echo "Aggregating ${#reports[@]} report(s):"
        printf '  %s\n' "${reports[@]}"

        ARGS=(--target "$INPUT_TARGET")
        for r in "${reports[@]}"; do ARGS+=(--report-file "$r"); done
        if [ -n "$INPUT_CONFIG" ]; then
          ARGS+=(--config "$INPUT_CONFIG")
        fi
        if [ "$INPUT_CHANGED_ONLY" = "true" ]; then
          ARGS+=(--changed-only)
        fi

        tfreport "${ARGS[@]}" > "$OUTPUT_PATH"
        echo "Wrote $(wc -c < "$OUTPUT_PATH") bytes to $OUTPUT_PATH"

    - name: Empty-state fallback
      if: ${{ steps.inventory.outputs.count == '0' }}
      shell: bash
      env:
        OUTPUT_PATH:   ${{ steps.resolve.outputs.output_path }}
        EMPTY_MESSAGE: ${{ inputs.empty-message }}
      run: |
        printf '%s\n' "$EMPTY_MESSAGE" > "$OUTPUT_PATH"

    - name: Send
      shell: bash
      env:
        INPUT_CONTENT_FILE:      ${{ steps.resolve.outputs.output_path }}
        INPUT_STEP_SUMMARY:      ${{ inputs.step-summary }}
        INPUT_PR_BODY_MARKER:    ${{ inputs.pr-body-marker }}
        INPUT_PR_COMMENT_MARKER: ${{ inputs.pr-comment-marker }}
        INPUT_GITHUB_TOKEN:      ${{ inputs.github-token }}
        INPUT_PR_NUMBER:         ${{ inputs.pr-number }}
      run: python3 "$GITHUB_ACTION_PATH/../../../scripts/send-report.py"
