name: tfreport-prepare
description: Export a per-subscription tfreport report JSON as an artifact — the per-matrix-leg half of a multi-subscription summary workflow
author: Black Mesa Ltd

# Call this inside each leg of a subscription/environment matrix. It produces
# a tfreport JSON export of the plan (label-tagged) and uploads it as an
# artifact so a downstream aggregate step can fan all of them into a single
# cross-sub summary.
#
# Pairs with: .github/action/aggregate

inputs:
  version:
    description: "tfreport version to install"
    required: false
    default: "latest"
  plan:
    description: "Path to a terraform binary plan file (e.g. plan.out). Requires terraform on PATH. Mutually exclusive with plan-file."
    required: false
  plan-file:
    description: "Path to pre-rendered terraform plan JSON. Mutually exclusive with plan."
    required: false
  text-plan-file:
    description: "Path to pre-rendered terraform plan text output. Used alongside plan-file; derived automatically when plan is set."
    required: false
  label:
    description: "Subscription/environment label stored in the exported report (becomes the <summary> title in aggregated renders)."
    required: true
  config:
    description: "Path to .tfreport.yml config file (applied to the JSON export)"
    required: false
  changed-only:
    description: "Export only changed resources"
    required: false
    default: "true"
  custom:
    description: |
      Custom metadata to attach to the exported report, one `key: value` per
      line (YAML block syntax). Survives JSON round-trip and is accessible in
      templates as `{{ $r.Custom.<key> }}`.

      The action AUTO-INJECTS these GitHub Actions context fields — you don't
      need to pass them yourself:
        workflow_url, run_id, run_number, run_attempt, sha, ref_name, actor,
        workflow, event_name, repository, server_url
      Values you supply below override any auto-injected key with the same
      name (last-wins).

      Use this input for anything NOT in the auto-injected set — typically
      subscription IDs, owner names, environment tags, matrix values.

      Values are treated as LITERAL STRINGS. Do not wrap in quotes — quotes
      are preserved in the value. Multi-line values and YAML escape sequences
      are not supported. Example:
        custom: |
          sub_id: 00000000-0000-0000-0000-000000000001
          owner: platform-team
    required: false
  preserve_attributes:
    description: |
      Opt-in allowlist of resource attribute paths to preserve on each
      ResourceChange (one path per line). Preserved values survive the JSON
      round-trip and are accessible in templates as
      `{{ index $rc.Preserved "<path>" }}`.

      Dotted paths walk into nested maps (e.g. `tags.environment`).
      Sensitive-marked attrs (per terraform's `before_sensitive` /
      `after_sensitive`) are NEVER preserved, regardless of this list — a
      warning is logged to stderr when such a skip happens. Computed
      (known-after-apply) values are preserved as the literal string
      `(known after apply)`.

      Example:
        preserve_attributes: |
          id
          location
          tags.environment
    required: false
  artifact-name:
    description: "Name of the uploaded artifact. Defaults to tfreport-<label>."
    required: false
  upload:
    description: "Upload the produced JSON as an artifact. Set to false to skip the upload and only produce a local file."
    required: false
    default: "true"

outputs:
  report-file:
    description: "Local filesystem path to the produced report JSON"
    value: ${{ steps.run.outputs.report_file }}
  artifact-name:
    description: "Resolved artifact name (mirrors the input or the derived default)"
    value: ${{ steps.run.outputs.artifact_name }}

runs:
  using: composite
  steps:
    - name: Prepare inputs
      shell: bash
      env:
        INPUT_PLAN: ${{ inputs.plan }}
        INPUT_PLAN_FILE: ${{ inputs.plan-file }}
        INPUT_TEXT_PLAN_FILE: ${{ inputs.text-plan-file }}
      run: |
        if [ -z "$INPUT_PLAN" ] && [ -z "$INPUT_PLAN_FILE" ]; then
          echo "::error::tfreport-prepare: exactly one of 'plan' or 'plan-file' must be provided"
          exit 1
        fi
        if [ -n "$INPUT_PLAN" ] && [ -n "$INPUT_PLAN_FILE" ]; then
          echo "::error::tfreport-prepare: 'plan' and 'plan-file' are mutually exclusive"
          exit 1
        fi
        if [ -n "$INPUT_TEXT_PLAN_FILE" ] && [ -z "$INPUT_PLAN_FILE" ]; then
          echo "::error::tfreport-prepare: 'text-plan-file' requires 'plan-file'"
          exit 1
        fi

        if [ -n "$INPUT_PLAN" ]; then
          if ! command -v terraform >/dev/null 2>&1; then
            echo "::error::tfreport-prepare: the 'plan' input requires terraform on PATH. Add 'hashicorp/setup-terraform@v3' before this step."
            exit 1
          fi
          DERIVED=$(mktemp -d)
          terraform show -json     "$INPUT_PLAN" > "$DERIVED/plan.json"
          terraform show -no-color "$INPUT_PLAN" > "$DERIVED/plan.txt"
          {
            echo "TFREPORT_PLAN_FILE=$DERIVED/plan.json"
            echo "TFREPORT_TEXT_PLAN_FILE=$DERIVED/plan.txt"
          } >> "$GITHUB_ENV"
        else
          echo "TFREPORT_PLAN_FILE=$INPUT_PLAN_FILE" >> "$GITHUB_ENV"
          if [ -n "$INPUT_TEXT_PLAN_FILE" ]; then
            echo "TFREPORT_TEXT_PLAN_FILE=$INPUT_TEXT_PLAN_FILE" >> "$GITHUB_ENV"
          fi
        fi

    - name: Install tfreport
      shell: bash
      env:
        TFREPORT_VERSION: ${{ inputs.version }}
      run: bash "$GITHUB_ACTION_PATH/../../../scripts/install-tfreport.sh"

    - name: Run tfreport (JSON export)
      id: run
      shell: bash
      env:
        INPUT_LABEL: ${{ inputs.label }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_CHANGED_ONLY: ${{ inputs.changed-only }}
        INPUT_ARTIFACT_NAME: ${{ inputs.artifact-name }}
        INPUT_CUSTOM: ${{ inputs.custom }}
        INPUT_PRESERVE: ${{ inputs.preserve_attributes }}
      run: |
        if [ -z "$INPUT_LABEL" ]; then
          echo "::error::tfreport-prepare: 'label' is required"
          exit 1
        fi

        # Artifact name: user-supplied OR derived from label (sanitised for GHA naming rules).
        if [ -n "$INPUT_ARTIFACT_NAME" ]; then
          ARTIFACT="$INPUT_ARTIFACT_NAME"
        else
          # Lower-case, replace any char not alnum/-/. with -
          sanitised=$(printf '%s' "$INPUT_LABEL" | tr '[:upper:]' '[:lower:]' | sed 's|[^a-z0-9._-]|-|g')
          ARTIFACT="tfreport-${sanitised}"
        fi

        OUT_DIR="${RUNNER_TEMP:-/tmp}/tfreport-prepare"
        mkdir -p "$OUT_DIR"
        REPORT_FILE="$OUT_DIR/report.json"

        ARGS=(--plan-file "$TFREPORT_PLAN_FILE" --target json --label "$INPUT_LABEL")
        if [ -n "${TFREPORT_TEXT_PLAN_FILE:-}" ]; then
          ARGS+=(--text-plan-file "$TFREPORT_TEXT_PLAN_FILE")
        fi
        if [ -n "$INPUT_CONFIG" ]; then
          ARGS+=(--config "$INPUT_CONFIG")
        fi
        if [ "$INPUT_CHANGED_ONLY" = "true" ]; then
          ARGS+=(--changed-only)
        fi

        # Translate the YAML-block `custom:` input into repeated --custom flags.
        mapfile -t CUSTOM_ARGS < <(
          TFREPORT_INPUT_CUSTOM="$INPUT_CUSTOM" \
          bash "$GITHUB_ACTION_PATH/../../../scripts/parse-custom-input.sh"
        )
        ARGS+=("${CUSTOM_ARGS[@]}")

        # Translate the YAML-block `preserve_attributes:` input into repeated --preserve flags.
        mapfile -t PRESERVE_ARGS < <(
          TFREPORT_INPUT_PRESERVE="$INPUT_PRESERVE" \
          bash "$GITHUB_ACTION_PATH/../../../scripts/parse-preserve-input.sh"
        )
        ARGS+=("${PRESERVE_ARGS[@]}")

        tfreport "${ARGS[@]}" > "$REPORT_FILE"

        {
          echo "report_file=$REPORT_FILE"
          echo "artifact_name=$ARTIFACT"
        } >> "$GITHUB_OUTPUT"

        echo "Wrote $(wc -c < "$REPORT_FILE") bytes to $REPORT_FILE (artifact: $ARTIFACT)"

    - name: Upload artifact
      if: ${{ inputs.upload == 'true' }}
      uses: actions/upload-artifact@v6
      with:
        name: ${{ steps.run.outputs.artifact_name }}
        path: ${{ steps.run.outputs.report_file }}
        if-no-files-found: error
