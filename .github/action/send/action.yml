name: tfreport-send
description: Write a rendered tfreport snippet to one or more GitHub destinations — step summary, PR body section, and/or sticky PR comment
author: Black Mesa Ltd

# Stage 4 of the matrix pipeline, or stage 2 of the single-plan pipeline.
# Drop-in final step after the render action or the aggregate action. Each
# destination is an independent opt-in — any combination is allowed in a
# single call.
#
# State preservation: when you use tfreport's preserve-* template helpers
# and want ticked checkboxes / user-edited regions to survive across PR
# updates, wire a --fetch-body pre-step into your workflow:
#
#   - run: python3 scripts/gh_api.py --fetch-body --github-token ${{ secrets.GITHUB_TOKEN }} --output old-body.md
#   - uses: ./.github/action
#     with:
#       plan-file: plan.json
#       previous-body-file: old-body.md
#       target: github-pr-body
#       output-file: new-snippet.md
#   - uses: ./.github/action/send
#     with:
#       content-file: new-snippet.md
#       pr-body-marker: TFREPORT
#       github-token: ${{ secrets.GITHUB_TOKEN }}

inputs:
  content-file:
    description: "Path to the file containing the rendered markdown to send"
    required: true
  step-summary:
    description: "Append the content to $GITHUB_STEP_SUMMARY"
    required: false
    default: "false"
  pr-body-marker:
    description: "Splice the content between <!-- BEGIN_<marker> --> and <!-- END_<marker> --> in the PR body. Empty = skip."
    required: false
    default: ""
  pr-comment-marker:
    description: "Upsert a sticky PR comment identified by <!-- <marker> --> at the start of the comment body. Empty = skip."
    required: false
    default: ""
  github-token:
    description: "GitHub token (required when pr-body-marker or pr-comment-marker is set)"
    required: false
    default: ""
  pr-number:
    description: "PR number override. Empty = auto-derive from the triggering event ($GITHUB_EVENT_PATH: .pull_request.number or .issue.number)."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Send
      shell: bash
      env:
        SEND_CONTENT_FILE: ${{ inputs.content-file }}
        SEND_STEP_SUMMARY: ${{ inputs.step-summary }}
        SEND_PR_BODY_MARKER: ${{ inputs.pr-body-marker }}
        SEND_PR_COMMENT_MARKER: ${{ inputs.pr-comment-marker }}
        SEND_GITHUB_TOKEN: ${{ inputs.github-token }}
        SEND_PR_NUMBER: ${{ inputs.pr-number }}
      run: |
        ARGS=(--send --content-file "$SEND_CONTENT_FILE")
        if [ "$SEND_STEP_SUMMARY" = "true" ]; then
          ARGS+=(--step-summary)
        fi
        if [ -n "$SEND_PR_BODY_MARKER" ]; then
          ARGS+=(--pr-body-marker "$SEND_PR_BODY_MARKER")
        fi
        if [ -n "$SEND_PR_COMMENT_MARKER" ]; then
          ARGS+=(--pr-comment-marker "$SEND_PR_COMMENT_MARKER")
        fi
        if [ -n "$SEND_GITHUB_TOKEN" ]; then
          ARGS+=(--github-token "$SEND_GITHUB_TOKEN")
        fi
        if [ -n "$SEND_PR_NUMBER" ]; then
          ARGS+=(--pr-number "$SEND_PR_NUMBER")
        fi
        python3 "$GITHUB_ACTION_PATH/../../../scripts/gh_api.py" "${ARGS[@]}"
