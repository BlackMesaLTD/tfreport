name: tfreport-report-plan
description: Render a single Terraform plan and send it to GitHub (step summary, PR body, and/or sticky PR comment) — the one-step version for single-plan workflows
author: Black Mesa Ltd

# Self-contained: all binary-install, render, and send logic is inlined (or
# sourced from scripts/). No sibling `uses:` refs, so there's no internal
# version coordination to worry about at release time.

inputs:
  # Render inputs
  version:
    description: "tfreport version to install"
    required: false
    default: "latest"
  target:
    description: "Output target (markdown, github-pr-body, github-pr-comment, github-step-summary, json)"
    required: false
    default: "markdown"
  plan:
    description: "Path to a terraform binary plan file. Requires terraform on PATH. Mutually exclusive with plan-file."
    required: false
  plan-file:
    description: "Path to a pre-rendered terraform plan JSON. Mutually exclusive with plan."
    required: false
  text-plan-file:
    description: "Path to a pre-rendered terraform plan text output. Used alongside plan-file."
    required: false
  label:
    description: "Optional label stored in the rendered report."
    required: false
  config:
    description: "Path to .tfreport.yml config file"
    required: false
  changed-only:
    description: "Show only changed resources"
    required: false
    default: "true"
  custom:
    description: |
      Custom metadata to attach to the rendered report, one `key: value` per
      line (YAML block syntax). Accessible in templates as
      `{{ $r.Custom.<key> }}`.

      The action AUTO-INJECTS these GitHub Actions context fields — you
      don't need to pass them yourself:
        workflow_url, run_id, run_number, run_attempt, sha, ref_name, actor,
        workflow, event_name, repository, server_url
      Values you supply below override any auto-injected key with the same
      name (last-wins).

      Use this input for anything NOT in the auto-injected set. Values are
      literal strings — no YAML escaping. Example:
        custom: |
          owner: platform-team
          environment: prod
    required: false
  preserve_attributes:
    description: |
      Opt-in allowlist of resource attribute paths to preserve on each
      ResourceChange (one path per line). Preserved values are accessible
      in templates as `{{ index $rc.Preserved "<path>" }}`.

      Dotted paths walk into nested maps (e.g. `tags.environment`).
      Sensitive-marked attrs are NEVER preserved; a warning is logged to
      stderr when skipped. Computed values become `(known after apply)`.

      Example:
        preserve_attributes: |
          id
          location
    required: false
  output-file:
    description: "Optional file path to persist the rendered output to. The preset always writes to a temp path regardless; use this to keep a copy at a known location."
    required: false

  # Send inputs
  step-summary:
    description: "Append the rendered output to $GITHUB_STEP_SUMMARY"
    required: false
    default: "false"
  pr-body-marker:
    description: "Splice the rendered output between <!-- BEGIN_<marker> --> and <!-- END_<marker> --> in the PR body. Empty = skip."
    required: false
    default: ""
  pr-comment-marker:
    description: "Upsert a sticky PR comment identified by <!-- <marker> --> at the start of the comment body. Empty = skip."
    required: false
    default: ""
  github-token:
    description: "GitHub token (required when pr-body-marker or pr-comment-marker is set)"
    required: false
    default: ""
  pr-number:
    description: "PR number override. Empty = auto-derive from the triggering event."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Resolve output path
      id: resolve
      shell: bash
      env:
        INPUT_OUTPUT_FILE: ${{ inputs.output-file }}
      run: |
        if [ -n "$INPUT_OUTPUT_FILE" ]; then
          path="$INPUT_OUTPUT_FILE"
        else
          path="$RUNNER_TEMP/tfreport-snippet.md"
        fi
        mkdir -p "$(dirname "$path")"
        echo "path=$path" >> "$GITHUB_OUTPUT"

    - name: Prepare plan inputs
      id: prep
      shell: bash
      env:
        INPUT_PLAN:            ${{ inputs.plan }}
        INPUT_PLAN_FILE:       ${{ inputs.plan-file }}
        INPUT_TEXT_PLAN_FILE:  ${{ inputs.text-plan-file }}
      run: |
        if [ -z "$INPUT_PLAN" ] && [ -z "$INPUT_PLAN_FILE" ]; then
          echo "::error::tfreport-report-plan: exactly one of 'plan' or 'plan-file' must be provided"
          exit 1
        fi
        if [ -n "$INPUT_PLAN" ] && [ -n "$INPUT_PLAN_FILE" ]; then
          echo "::error::tfreport-report-plan: 'plan' and 'plan-file' are mutually exclusive"
          exit 1
        fi
        if [ -n "$INPUT_TEXT_PLAN_FILE" ] && [ -z "$INPUT_PLAN_FILE" ]; then
          echo "::error::tfreport-report-plan: 'text-plan-file' requires 'plan-file' (it is derived automatically from 'plan')"
          exit 1
        fi

        if [ -n "$INPUT_PLAN" ]; then
          if ! command -v terraform >/dev/null 2>&1; then
            echo "::error::tfreport-report-plan: the 'plan' input requires terraform on PATH. Add 'hashicorp/setup-terraform@v3' before this step."
            exit 1
          fi
          DERIVED=$(mktemp -d)
          terraform show -json     "$INPUT_PLAN" > "$DERIVED/plan.json"
          terraform show -no-color "$INPUT_PLAN" > "$DERIVED/plan.txt"
          {
            echo "plan_file=$DERIVED/plan.json"
            echo "text_plan_file=$DERIVED/plan.txt"
          } >> "$GITHUB_OUTPUT"
        else
          {
            echo "plan_file=$INPUT_PLAN_FILE"
            if [ -n "$INPUT_TEXT_PLAN_FILE" ]; then
              echo "text_plan_file=$INPUT_TEXT_PLAN_FILE"
            else
              echo "text_plan_file="
            fi
          } >> "$GITHUB_OUTPUT"
        fi

    - name: Install tfreport
      shell: bash
      env:
        TFREPORT_VERSION: ${{ inputs.version }}
      run: bash "$GITHUB_ACTION_PATH/../../../scripts/install-tfreport.sh"

    - name: Render
      shell: bash
      env:
        INPUT_TARGET:          ${{ inputs.target }}
        INPUT_CONFIG:          ${{ inputs.config }}
        INPUT_CHANGED_ONLY:    ${{ inputs.changed-only }}
        INPUT_LABEL:           ${{ inputs.label }}
        INPUT_CUSTOM:          ${{ inputs.custom }}
        INPUT_PRESERVE:        ${{ inputs.preserve_attributes }}
        PLAN_FILE:             ${{ steps.prep.outputs.plan_file }}
        TEXT_PLAN_FILE:        ${{ steps.prep.outputs.text_plan_file }}
        OUTPUT_PATH:           ${{ steps.resolve.outputs.path }}
      run: |
        ARGS=(--plan-file "$PLAN_FILE" --target "$INPUT_TARGET")
        if [ -n "$TEXT_PLAN_FILE" ]; then
          ARGS+=(--text-plan-file "$TEXT_PLAN_FILE")
        fi
        if [ -n "$INPUT_LABEL" ]; then
          ARGS+=(--label "$INPUT_LABEL")
        fi
        if [ -n "$INPUT_CONFIG" ]; then
          ARGS+=(--config "$INPUT_CONFIG")
        fi
        if [ "$INPUT_CHANGED_ONLY" = "true" ]; then
          ARGS+=(--changed-only)
        fi

        # Translate the YAML-block `custom:` input into repeated --custom flags.
        mapfile -t CUSTOM_ARGS < <(
          TFREPORT_INPUT_CUSTOM="$INPUT_CUSTOM" \
          bash "$GITHUB_ACTION_PATH/../../../scripts/parse-custom-input.sh"
        )
        ARGS+=("${CUSTOM_ARGS[@]}")

        # Translate the YAML-block `preserve_attributes:` input into repeated --preserve flags.
        mapfile -t PRESERVE_ARGS < <(
          TFREPORT_INPUT_PRESERVE="$INPUT_PRESERVE" \
          bash "$GITHUB_ACTION_PATH/../../../scripts/parse-preserve-input.sh"
        )
        ARGS+=("${PRESERVE_ARGS[@]}")

        tfreport "${ARGS[@]}" > "$OUTPUT_PATH"
        echo "Wrote $(wc -c < "$OUTPUT_PATH") bytes to $OUTPUT_PATH"

    - name: Send
      shell: bash
      env:
        SEND_CONTENT_FILE:      ${{ steps.resolve.outputs.path }}
        SEND_STEP_SUMMARY:      ${{ inputs.step-summary }}
        SEND_PR_BODY_MARKER:    ${{ inputs.pr-body-marker }}
        SEND_PR_COMMENT_MARKER: ${{ inputs.pr-comment-marker }}
        SEND_GITHUB_TOKEN:      ${{ inputs.github-token }}
        SEND_PR_NUMBER:         ${{ inputs.pr-number }}
      run: |
        ARGS=(--send --content-file "$SEND_CONTENT_FILE")
        if [ "$SEND_STEP_SUMMARY" = "true" ]; then
          ARGS+=(--step-summary)
        fi
        if [ -n "$SEND_PR_BODY_MARKER" ]; then
          ARGS+=(--pr-body-marker "$SEND_PR_BODY_MARKER")
        fi
        if [ -n "$SEND_PR_COMMENT_MARKER" ]; then
          ARGS+=(--pr-comment-marker "$SEND_PR_COMMENT_MARKER")
        fi
        if [ -n "$SEND_GITHUB_TOKEN" ]; then
          ARGS+=(--github-token "$SEND_GITHUB_TOKEN")
        fi
        if [ -n "$SEND_PR_NUMBER" ]; then
          ARGS+=(--pr-number "$SEND_PR_NUMBER")
        fi
        python3 "$GITHUB_ACTION_PATH/../../../scripts/gh_api.py" "${ARGS[@]}"
