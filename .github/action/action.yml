name: tfreport
description: Render a single Terraform plan as a human-readable report
author: Black Mesa Ltd

# Single-plan render. For multi-subscription matrix workflows, use the
# sub-actions: .github/action/prepare (per-sub in matrix) and
# .github/action/aggregate (cross-sub summary).

inputs:
  version:
    description: "tfreport version to install"
    required: false
    default: "latest"
  target:
    description: "Output target (markdown, github-pr-body, github-pr-comment, github-step-summary, json)"
    required: false
    default: "markdown"
  plan:
    description: "Path to a terraform binary plan file (e.g. plan.out). Requires terraform on PATH. Mutually exclusive with plan-file."
    required: false
  plan-file:
    description: "Path to pre-rendered terraform plan JSON. Mutually exclusive with plan."
    required: false
  text-plan-file:
    description: "Path to pre-rendered terraform plan text output. Used alongside plan-file; derived automatically when plan is set."
    required: false
  label:
    description: "Optional label stored in the rendered report (passed as --label)."
    required: false
  config:
    description: "Path to .tfreport.yml config file"
    required: false
  changed-only:
    description: "Show only changed resources"
    required: false
    default: "true"
  custom:
    description: |
      Custom metadata to attach to the rendered report, one `key: value` per
      line (YAML block syntax). Survives JSON round-trip and is accessible in
      templates as `{{ $r.Custom.<key> }}`. Use for subscription IDs, owner
      names, environment tags — anything that isn't derivable from the plan.

      Values are treated as LITERAL STRINGS. Do not wrap in quotes — quotes
      are preserved in the value. Multi-line values and YAML escape sequences
      are not supported. Example:
        custom: |
          workflow_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          owner: platform-team
    required: false
  output-file:
    description: "Optional file path to write the rendered output to. Use this for renders likely to exceed ~1 MB (step-summary of large plans)."
    required: false

outputs:
  report:
    description: "The rendered report (truncated to a marker if over ~1 MB — use output-file for large renders)"
    value: ${{ steps.run.outputs.report }}

runs:
  using: composite
  steps:
    - name: Prepare inputs
      shell: bash
      env:
        INPUT_PLAN: ${{ inputs.plan }}
        INPUT_PLAN_FILE: ${{ inputs.plan-file }}
        INPUT_TEXT_PLAN_FILE: ${{ inputs.text-plan-file }}
      run: |
        if [ -z "$INPUT_PLAN" ] && [ -z "$INPUT_PLAN_FILE" ]; then
          echo "::error::tfreport action: exactly one of 'plan' or 'plan-file' must be provided"
          exit 1
        fi
        if [ -n "$INPUT_PLAN" ] && [ -n "$INPUT_PLAN_FILE" ]; then
          echo "::error::tfreport action: 'plan' and 'plan-file' are mutually exclusive"
          exit 1
        fi
        if [ -n "$INPUT_TEXT_PLAN_FILE" ] && [ -z "$INPUT_PLAN_FILE" ]; then
          echo "::error::tfreport action: 'text-plan-file' requires 'plan-file' (it is derived automatically from 'plan')"
          exit 1
        fi

        if [ -n "$INPUT_PLAN" ]; then
          if ! command -v terraform >/dev/null 2>&1; then
            echo "::error::tfreport action: the 'plan' input requires terraform on PATH. Add 'hashicorp/setup-terraform@v3' before this step."
            exit 1
          fi
          DERIVED=$(mktemp -d)
          terraform show -json     "$INPUT_PLAN" > "$DERIVED/plan.json"
          terraform show -no-color "$INPUT_PLAN" > "$DERIVED/plan.txt"
          {
            echo "TFREPORT_PLAN_FILE=$DERIVED/plan.json"
            echo "TFREPORT_TEXT_PLAN_FILE=$DERIVED/plan.txt"
          } >> "$GITHUB_ENV"
        else
          echo "TFREPORT_PLAN_FILE=$INPUT_PLAN_FILE" >> "$GITHUB_ENV"
          if [ -n "$INPUT_TEXT_PLAN_FILE" ]; then
            echo "TFREPORT_TEXT_PLAN_FILE=$INPUT_TEXT_PLAN_FILE" >> "$GITHUB_ENV"
          fi
        fi

    - name: Install tfreport
      shell: bash
      env:
        TFREPORT_VERSION: ${{ inputs.version }}
      run: bash "$GITHUB_ACTION_PATH/../../scripts/install-tfreport.sh"

    - name: Run tfreport
      id: run
      shell: bash
      env:
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_CHANGED_ONLY: ${{ inputs.changed-only }}
        INPUT_LABEL: ${{ inputs.label }}
        INPUT_CUSTOM: ${{ inputs.custom }}
        INPUT_OUTPUT_FILE: ${{ inputs.output-file }}
      run: |
        ARGS=(--plan-file "$TFREPORT_PLAN_FILE" --target "$INPUT_TARGET")
        if [ -n "${TFREPORT_TEXT_PLAN_FILE:-}" ]; then
          ARGS+=(--text-plan-file "$TFREPORT_TEXT_PLAN_FILE")
        fi
        if [ -n "$INPUT_LABEL" ]; then
          ARGS+=(--label "$INPUT_LABEL")
        fi
        if [ -n "$INPUT_CONFIG" ]; then
          ARGS+=(--config "$INPUT_CONFIG")
        fi
        if [ "$INPUT_CHANGED_ONLY" = "true" ]; then
          ARGS+=(--changed-only)
        fi

        # Translate the YAML-block `custom:` input into repeated --custom flags.
        mapfile -t CUSTOM_ARGS < <(
          TFREPORT_INPUT_CUSTOM="$INPUT_CUSTOM" \
          bash "$GITHUB_ACTION_PATH/../../scripts/parse-custom-input.sh"
        )
        ARGS+=("${CUSTOM_ARGS[@]}")

        OUTPUT=$(tfreport "${ARGS[@]}")

        if [ -n "$INPUT_OUTPUT_FILE" ]; then
          mkdir -p "$(dirname "$INPUT_OUTPUT_FILE")"
          printf '%s' "$OUTPUT" > "$INPUT_OUTPUT_FILE"
        fi

        bytes=$(printf '%s' "$OUTPUT" | wc -c)
        if [ "$bytes" -gt 900000 ]; then
          echo "::warning::tfreport action: output is ${bytes} bytes; step output 'report' is omitted (GITHUB_OUTPUT cap). Use output-file to capture large renders."
          echo "report=<output-file>" >> "$GITHUB_OUTPUT"
        else
          {
            echo "report<<TFREPORT_EOF"
            printf '%s\n' "$OUTPUT"
            echo "TFREPORT_EOF"
          } >> "$GITHUB_OUTPUT"
        fi

        printf '%s\n' "$OUTPUT"
