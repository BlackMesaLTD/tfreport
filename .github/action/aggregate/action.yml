name: tfreport-aggregate
description: Combine multiple tfreport report JSONs (one per subscription/environment) into a single cross-report render
author: Black Mesa Ltd

# Stage 3 of the matrix pipeline (prepare → download → aggregate → send).
# Pure render: takes local report files on disk (produced upstream by
# tfreport-download or any other producer) and emits a rendered markdown
# output. No artifact awareness; that's tfreport-download's job.

inputs:
  version:
    description: "tfreport version to install"
    required: false
    default: "latest"
  target:
    description: "Output target (markdown, github-pr-body, github-pr-comment, github-step-summary, json)"
    required: false
    default: "markdown"
  report-files:
    description: "Glob pattern or newline-separated list of report JSON paths on disk (typically the `reports` output from tfreport-download)."
    required: true
  config:
    description: "Path to .tfreport.yml config file"
    required: false
  changed-only:
    description: "Show only changed resources"
    required: false
    default: "true"
  output-file:
    description: "Optional file path to write the rendered output to. Recommended for large cross-sub renders that blow past the ~1 MB GITHUB_OUTPUT ceiling."
    required: false

outputs:
  report:
    description: "The rendered aggregated report (truncated to a marker if over ~1 MB — use output-file for large renders)"
    value: ${{ steps.run.outputs.report }}

runs:
  using: composite
  steps:
    - name: Install tfreport
      shell: bash
      env:
        TFREPORT_VERSION: ${{ inputs.version }}
      run: bash "$GITHUB_ACTION_PATH/../../../scripts/install-tfreport.sh"

    - name: Run tfreport (multi-report aggregation)
      id: run
      shell: bash
      env:
        INPUT_REPORT_FILES: ${{ inputs.report-files }}
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_CONFIG: ${{ inputs.config }}
        INPUT_CHANGED_ONLY: ${{ inputs.changed-only }}
        INPUT_OUTPUT_FILE: ${{ inputs.output-file }}
      run: |
        shopt -s nullglob

        reports=()
        while IFS= read -r line; do
          line="${line## }"; line="${line%% }"
          [ -z "$line" ] && continue
          for p in $line; do reports+=("$p"); done
        done <<< "$INPUT_REPORT_FILES"

        if [ ${#reports[@]} -eq 0 ]; then
          echo "::error::tfreport-aggregate: report-files matched zero files"
          exit 1
        fi

        echo "Aggregating ${#reports[@]} report(s):"
        printf '  %s\n' "${reports[@]}"

        ARGS=(--target "$INPUT_TARGET")
        for r in "${reports[@]}"; do ARGS+=(--report-file "$r"); done
        if [ -n "$INPUT_CONFIG" ]; then
          ARGS+=(--config "$INPUT_CONFIG")
        fi
        if [ "$INPUT_CHANGED_ONLY" = "true" ]; then
          ARGS+=(--changed-only)
        fi

        OUTPUT=$(tfreport "${ARGS[@]}")

        if [ -n "$INPUT_OUTPUT_FILE" ]; then
          mkdir -p "$(dirname "$INPUT_OUTPUT_FILE")"
          printf '%s' "$OUTPUT" > "$INPUT_OUTPUT_FILE"
        fi

        bytes=$(printf '%s' "$OUTPUT" | wc -c)
        if [ "$bytes" -gt 900000 ]; then
          echo "::warning::tfreport-aggregate: output is ${bytes} bytes; step output 'report' is omitted (GITHUB_OUTPUT cap). Use output-file to capture large renders."
          echo "report=<output-file>" >> "$GITHUB_OUTPUT"
        else
          {
            echo "report<<TFREPORT_EOF"
            printf '%s\n' "$OUTPUT"
            echo "TFREPORT_EOF"
          } >> "$GITHUB_OUTPUT"
        fi

        printf '%s\n' "$OUTPUT"
